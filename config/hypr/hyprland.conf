$mod = SUPER
$terminal = ~/.config/archmeros/scripts/archmeros-wezterm.sh terminal
$fileManager = thunar
$launcher = ~/.config/archmeros/scripts/archmeros-launcher.sh
$paraHub = ~/.config/archmeros/scripts/archmeros-para.sh

source = ~/.config/hypr/theme.conf
source = ~/.config/hypr/transparency.conf

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_SCALE_FACTOR,1.10
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1.10
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

exec-once = waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css
exec-once = mako -c ~/.config/mako/config
exec-once = ~/.config/archmeros/scripts/archmeros-wallpaper.sh
exec-once = ~/.config/archmeros/scripts/archmeros-session-appearance.sh
exec-once = ~/.config/archmeros/scripts/archmeros-audio-policy.sh
exec-once = sh -lc 'command -v systemctl >/dev/null 2>&1 && systemctl --user restart hypridle.service >/tmp/archmeros-hypridle.log 2>&1'
exec-once = systemctl --user start archmeros-elephant.service archmeros-walker.service archmeros-reopen-listener.service archmeros-notification-focus.service
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = blueman-applet

monitor = DP-3, preferred, 0x0, 1
monitor = HDMI-A-1, preferred, 1366x0, 1
monitor = DP-2, preferred, 3286x0, 1

workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:DP-3, default:true
workspace = 9, monitor:DP-2, default:true

general {
    gaps_in = 8
    gaps_out = 10
    border_size = 2
    col.active_border = $archmeros_active_border
    col.inactive_border = $archmeros_inactive_border
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    active_opacity = $archmeros_active_opacity
    inactive_opacity = $archmeros_inactive_opacity
    fullscreen_opacity = 1.0

    blur {
        enabled = $archmeros_blur_enabled
        size = $archmeros_blur_size
        passes = $archmeros_blur_passes
        ignore_opacity = true
        new_optimizations = true
        noise = 0.018
        contrast = 1.05
        brightness = 1.0
        vibrancy = $archmeros_blur_vibrancy
        popups = true
        popups_ignorealpha = 0.2
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = $archmeros_shadow
    }
}

animations {
    enabled = true
    bezier = curve, 0.16, 1, 0.3, 1
    animation = windows, 1, 5, curve, slide
    animation = windowsOut, 1, 5, curve, slide
    animation = border, 1, 8, curve
    animation = borderangle, 1, 8, curve
    animation = fade, 1, 5, curve
    animation = workspaces, 1, 6, curve, slidefade 18%
}

input {
    kb_layout = br,us
    kb_variant = abnt2,
    kb_options = grp:alt_shift_toggle,lvl3:ralt_switch
    kb_file = ~/.config/hypr/archmeros-keyboard.xkb
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
}

cursor {
    no_hardware_cursors = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

bind = $mod, T, exec, $terminal
bind = CTRL ALT, T, exec, ~/.config/archmeros/scripts/archmeros-termius.sh
bind = CTRL $mod, T, exec, ~/.config/archmeros/scripts/archmeros-termius.sh
bind = $mod, SPACE, exec, $launcher
bind = $mod SHIFT, SPACE, exec, rofi -show drun -show-icons -theme ~/.config/rofi/launchers/drun.rasi
bind = $mod, E, exec, $paraHub
bind = CTRL ALT, SPACE, exec, hyprctl switchxkblayout current next
bind = SUPER, INSERT, exec, /home/zacmero/.config/archmeros/scripts/archmeros-keyboard.sh toggle
bind = ALT, W, exec, ~/.config/archmeros/scripts/archmeros-close.sh
bind = ALT, code:25, exec, ~/.config/archmeros/scripts/archmeros-close.sh
bind = $mod ALT, W, exec, ~/.config/archmeros/scripts/archmeros-wallpaper-pick.sh
bind = $mod ALT, A, exec, ~/.config/archmeros/scripts/archmeros-appearance.sh
bind = $mod, A, exec, ~/.config/archmeros/scripts/archmeros-ai-float.sh aichat
bind = $mod SHIFT, A, exec, ~/.config/archmeros/scripts/archmeros-ai-float.sh fabric
bind = $mod CTRL, A, exec, ~/.config/archmeros/scripts/archmeros-ai-float.sh sessions
bind = $mod ALT, S, exec, ~/.config/archmeros/scripts/archmeros-audio.sh
bind = $mod ALT, T, exec, ~/.config/archmeros/scripts/archmeros-theme-select.sh
bind = $mod, Print, exec, ~/.config/archmeros/scripts/archmeros-screenshot.sh region
bind = $mod SHIFT, Print, exec, ~/.config/archmeros/scripts/archmeros-screenshot.sh full
bind = $mod, code:107, exec, ~/.config/archmeros/scripts/archmeros-screenshot.sh region
bind = $mod SHIFT, code:107, exec, ~/.config/archmeros/scripts/archmeros-screenshot.sh full
bind = $mod, Sys_Req, exec, ~/.config/archmeros/scripts/archmeros-screenshot.sh region
bind = $mod SHIFT, Sys_Req, exec, ~/.config/archmeros/scripts/archmeros-screenshot.sh full
bind = $mod, F12, exec, ~/.config/archmeros/scripts/archmeros-screenshot.sh region
bind = $mod SHIFT, F12, exec, ~/.config/archmeros/scripts/archmeros-screenshot.sh full
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , code:121, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , code:122, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , code:123, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , code:173, exec, playerctl previous
bind = , code:172, exec, playerctl play-pause
bind = , code:171, exec, playerctl next
bind = $mod, bracketleft, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mod, backslash, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = $mod, bracketright, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+

bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, KP_1, workspace, 1
bind = ALT, KP_2, workspace, 2
bind = ALT, KP_3, workspace, 3
bind = ALT, KP_4, workspace, 4
bind = ALT, KP_5, workspace, 5
bind = ALT, code:87, workspace, 1
bind = ALT, code:88, workspace, 2
bind = ALT, code:89, workspace, 3
bind = ALT, code:83, workspace, 4
bind = ALT, code:84, workspace, 5
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7

bind = CTRL ALT, LEFT, workspace, m-1
bind = CTRL ALT, RIGHT, workspace, m+1

bind = $mod SHIFT, F1, movetoworkspace, 1
bind = $mod SHIFT, F2, movetoworkspace, 2
bind = $mod SHIFT, F3, movetoworkspace, 3
bind = $mod SHIFT, F4, movetoworkspace, 4
bind = $mod SHIFT, F5, movetoworkspace, 5
bind = $mod SHIFT, F6, movetoworkspace, 6
bind = $mod SHIFT, F7, movetoworkspace, 7

bind = $mod, RETURN, exec, ~/.config/archmeros/scripts/archmeros-wezterm.sh terminal
bind = $mod, W, exec, ~/.config/archmeros/scripts/archmeros-close.sh
bind = $mod, Q, exec, ~/.config/archmeros/scripts/archmeros-close.sh
bind = $mod, O, exec, python3 ~/.config/archmeros/scripts/archmeros-reopen-history.py reopen-folders
bind = $mod SHIFT, O, exec, python3 ~/.config/archmeros/scripts/archmeros-reopen-history.py reopen-general
bind = $mod, V, togglefloating
bind = $mod, P, pseudo
bind = $mod, F, exec, ~/.config/archmeros/scripts/archmeros-fullscreen.sh
bind = $mod, C, exec, ~/.config/archmeros/scripts/archmeros-webapp.sh gemini
bind = $mod, grave, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh full
bind = $mod SHIFT, grave, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh medium
bind = ALT, grave, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh full
bind = ALT SHIFT, grave, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh medium
bind = $mod, code:49, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh full
bind = $mod SHIFT, code:49, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh medium
bind = ALT, code:49, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh full
bind = ALT SHIFT, code:49, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh medium
bind = $mod SHIFT, P, exec, wdisplays
bind = $mod SHIFT, B, exec, ~/.config/archmeros/scripts/archmeros-refresh-shell.sh
bind = $mod SHIFT, C, exec, ~/.config/archmeros/scripts/archmeros-webapp.sh chatgpt
bind = $mod, M, exec, [workspace 9 silent] ~/.config/archmeros/scripts/archmeros-youtube-music.sh
bind = $mod, N, exec, ~/.config/archmeros/scripts/archmeros-note.sh
bind = $mod SHIFT, N, exec, ~/.config/archmeros/scripts/archmeros-productivity.sh
bind = $mod, G, exec, ~/.config/archmeros/scripts/archmeros-telegram.sh
bind = $mod, B, exec, /usr/bin/firefox
bind = $mod, period, exec, ~/.config/archmeros/scripts/archmeros-emoji.sh
