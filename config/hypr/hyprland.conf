bind = $mod SHIFT, K, exec, ~/.config/archmeros/scripts/archmeros-move-window.py u
bind = $mod SHIFT, H, exec, ~/.config/archmeros/scripts/archmeros-move-window.py l
bind = $mod SHIFT, L, exec, ~/.config/archmeros/scripts/archmeros-move-window.py r
