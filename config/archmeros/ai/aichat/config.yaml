model: gemini:gemini-3.1-flash-lite-preview
temperature: 0.7
top_p: 0.95

stream: true
save: true
keybindings: emacs
editor: nvim
wrap: auto
wrap_code: true
left_prompt: "{color.light_magenta}━━ YOU{?session [{session}]}{color.reset}\n{color.light_magenta}❯{color.reset} "
right_prompt: "{color.dark_gray}{?consume_tokens ctx {consume_tokens} ({consume_percent}%)}{color.reset}"

repl_prelude: "role:coder"
serve_addr: 127.0.0.1:8000

clients:
  - type: gemini
    models:
      - name: gemini-3.1-flash-lite-preview
        max_input_tokens: 1048576
        supports_function_calling: true

document_loaders:
  pdf: "pdftotext $1 -"
