force_keyboard_focus = true
close_when_open = true
click_to_close = true
as_window = true
single_click_activation = true
selection_wrap = false
theme = "archmeros"
disable_mouse = false
hide_quick_activation = false
hide_action_hints = false
hide_action_hints_dmenu = true
app_launch_prefix = ""
terminal = "wezterm start --always-new-process --"

[shell]
exclusive_zone = -1
layer = "overlay"
anchor_top = true
anchor_bottom = true
anchor_left = true
anchor_right = true

[search]
placeholder = "Launch apps, commands, and recent actions"

[list]
max_entries = 12
show_initial_entries = true

[ui]
anchors = ["center"]
fullscreen = false
width = 560
maxheight = 520

[activation_mode]
labels = "home-row"

[providers]
default = [
  "desktopapplications",
  "calc",
  "websearch"
]
empty = ["desktopapplications"]

[[providers.prefixes]]
prefix = ";"
provider = "providerlist"

[[providers.prefixes]]
prefix = ">"
provider = "runner"

[[providers.prefixes]]
prefix = "/"
provider = "files"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = "$"
provider = "windows"
