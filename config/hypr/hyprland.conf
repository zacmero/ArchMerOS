windowrule = match:class ^(archmeros-fabric-browser)$, size 74% 82%
windowrule = match:class ^(archmeros-fabric-browser)$, opacity $archmeros_terminal_active_opacity $archmeros_terminal_inactive_opacity
windowrule = match:title ^(.* - )?YouTube Music$, workspace 9 silent
windowrule = match:class ^(archmeros-todoist)$, workspace 5 silent
windowrule = match:class ^(archmeros-evernote)$, workspace 5 silent

layerrule = blur on, ignore_alpha 0.15, match:namespace ^(waybar)$
layerrule = blur on, ignore_alpha 0.15, match:namespace ^(notifications)$
layerrule = blur on, ignore_alpha 0.15, match:namespace ^(walker)$
layerrule = blur on, ignore_alpha 0.15, match:namespace ^(rofi)$
