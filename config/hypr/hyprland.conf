bind = $mod SHIFT, TAB, exec, ~/.config/archmeros/scripts/archmeros-cycle-window.sh all prev
bindm = SHIFT, mouse:272, movewindow
bindm = SHIFT, mouse:273, resizewindow
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

windowrule = match:class (thunar|Thunar), opacity $archmeros_thunar_active_opacity $archmeros_thunar_inactive_opacity
windowrule = match:class (thunar|Thunar), float 1
windowrule = match:class (thunar|Thunar), size 72% 76%
windowrule = match:class (thunar|Thunar), center 1

windowrule = match:class ^(dev\\.benz\\.walker)$, float 1
windowrule = match:class ^(dev\\.benz\\.walker)$, center 1
windowrule = match:class ^(dev\\.benz\\.walker)$, size 34% 42%
windowrule = match:class ^(dev\\.benz\\.walker)$, opacity $archmeros_walker_active_opacity $archmeros_walker_inactive_opacity

windowrule = match:class ^(it\\.mijorus\\.smile)$, float 1
windowrule = match:class ^(it\\.mijorus\\.smile)$, center 1
windowrule = match:class ^(it\\.mijorus\\.smile)$, size 34% 46%
windowrule = match:class ^(it\\.mijorus\\.smile)$, opacity 0.92 0.86

windowrule = match:class ^(imv)$, float 1
windowrule = match:class ^(imv)$, center 1
windowrule = match:class ^(imv)$, size 52% 62%
windowrule = match:class ^(imv)$, opacity 0.94 0.9

windowrule = match:title ^ArchMerOS Wallpaper Picker$, float 1
windowrule = match:title ^ArchMerOS Wallpaper Picker$, center 1
windowrule = match:title ^ArchMerOS Wallpaper Picker$, size 68% 76%
windowrule = match:title ^Crop Wallpaper.*$, float 1
windowrule = match:title ^Crop Wallpaper.*$, center 1
windowrule = match:title ^Crop Wallpaper.*$, size 84% 88%

windowrule = match:title ^ArchMerOS Calendar$, float 1
windowrule = match:title ^ArchMerOS Calendar$, center 1
windowrule = match:title ^ArchMerOS Calendar$, size 28% 38%
windowrule = match:title ^ArchMerOS Calendar$, opacity 0.98 0.98

windowrule = match:class ^(ArchMerOS-Screensaver)$, float 1
windowrule = match:class ^(ArchMerOS-Screensaver)$, fullscreen 1
windowrule = match:class ^(ArchMerOS-Screensaver)$, opacity 1 1

windowrule = match:class (org\\.wezfurlong\\.wezterm), opacity $archmeros_terminal_active_opacity $archmeros_terminal_inactive_opacity
windowrule = match:class ^(archmeros-wezterm-.*)$, opacity $archmeros_terminal_active_opacity $archmeros_terminal_inactive_opacity
windowrule = match:class (code|codium|Code|Codium), opacity $archmeros_code_active_opacity $archmeros_code_inactive_opacity
windowrule = match:class ^(archmeros-chatgpt)$, float 1
windowrule = match:class ^(archmeros-chatgpt)$, size 72% 76%
windowrule = match:class ^(archmeros-chatgpt)$, center 1
windowrule = match:class ^(archmeros-chatgpt)$, opacity $archmeros_walker_active_opacity $archmeros_walker_inactive_opacity
windowrule = match:class ^(archmeros-gemini)$, float 1
windowrule = match:class ^(archmeros-gemini)$, size 72% 76%
windowrule = match:class ^(archmeros-gemini)$, center 1
windowrule = match:class ^(archmeros-gemini)$, opacity $archmeros_walker_active_opacity $archmeros_walker_inactive_opacity
windowrule = match:class ^(archmeros-aichat-float)$, float 1
windowrule = match:class ^(archmeros-aichat-float)$, center 1
windowrule = match:class ^(archmeros-aichat-float)$, size 72% 76%
windowrule = match:class ^(archmeros-aichat-float)$, opacity $archmeros_terminal_active_opacity $archmeros_terminal_inactive_opacity
windowrule = match:class ^(archmeros-aichat-sessions)$, float 1
windowrule = match:class ^(archmeros-aichat-sessions)$, center 1
windowrule = match:class ^(archmeros-aichat-sessions)$, size 72% 76%
