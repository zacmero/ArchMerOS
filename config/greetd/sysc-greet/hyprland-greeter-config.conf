# ArchMerOS Hyprland config for a later greetd/sysc-greet migration.
# This file is not active yet.

animations {
    enabled = false
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
}

monitor = DP-2, 1366x768@59.79, 0x0, 1
monitor = HDMI-A-4, 1920x1080@60, 1366x0, 1
monitor = VGA-1, 1440x900@59.89, 3286x0, 1

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(000000)
    disable_watchdog_warning = true
}

input {
    kb_layout = us,br
    repeat_delay = 400
    repeat_rate = 40

    touchpad {
        tap-to-click = true
    }
}

windowrule = match:class ^(kitty)$, fullscreen on, opacity 1.0

exec-once = XDG_CACHE_HOME=/tmp/greeter-cache HOME=/var/lib/greeter kitty --start-as=fullscreen --config=/etc/greetd/kitty-greeter.conf /usr/local/bin/sysc-greet --theme archmeros && hyprctl dispatch exit
