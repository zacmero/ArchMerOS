# ArchMerOS Hyprland config for a later greetd/sysc-greet migration.
# This file is not active yet.

animations {
    enabled = false
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
}

monitor = DP-3, preferred, 0x0, 1
monitor = HDMI-A-1, preferred, 1366x0, 1
monitor = DP-2, preferred, 3286x0, 1

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

workspace = 1, monitor:HDMI-A-1, default:true
workspace = 8, monitor:DP-3, default:true
workspace = 9, monitor:DP-2, default:true

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(000000)
    disable_watchdog_warning = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

input {
    kb_layout = us,br
    repeat_delay = 400
    repeat_rate = 40

    touchpad {
        tap-to-click = true
    }
}

windowrule = match:class ^(kitty)$, fullscreen on, opacity 1.0
windowrule = match:class ^(kitty)$, workspace 1 silent

exec-once = kitty --start-as=fullscreen --config=/etc/greetd/kitty-greeter.conf /usr/local/bin/sysc-greet --theme archmeros && hyprctl dispatch exit
