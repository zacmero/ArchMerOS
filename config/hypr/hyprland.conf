$mod = SUPER
$terminal = ~/.config/archmeros/scripts/archmeros-terminal.sh
$fileManager = thunar
$launcher = ~/.config/archmeros/scripts/archmeros-launcher.sh
$paraHub = ~/.config/archmeros/scripts/archmeros-para.sh

source = ~/.config/hypr/theme.conf
source = ~/.config/hypr/transparency.conf

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Amber

exec-once = waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css
exec-once = mako -c ~/.config/mako/config
exec-once = ~/.config/archmeros/scripts/archmeros-wallpaper.sh
exec-once = systemctl --user start archmeros-elephant.service archmeros-walker.service
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = blueman-applet

monitor = DP-2, 1366x768@59.79, 0x0, 1
monitor = HDMI-A-4, 1920x1080@60, 1366x0, 1
monitor = VGA-1, 1440x900@59.89, 3286x0, 1

workspace = 1, monitor:HDMI-A-4, default:true
workspace = 2, monitor:HDMI-A-4
workspace = 3, monitor:HDMI-A-4
workspace = 4, monitor:HDMI-A-4
workspace = 8, monitor:DP-2, default:true
workspace = 9, monitor:VGA-1, default:true

general {
    gaps_in = 8
    gaps_out = 10
    border_size = 2
    col.active_border = $archmeros_active_border
    col.inactive_border = $archmeros_inactive_border
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8
    active_opacity = $archmeros_active_opacity
    inactive_opacity = $archmeros_inactive_opacity
    fullscreen_opacity = 1.0

    blur {
        enabled = $archmeros_blur_enabled
        size = $archmeros_blur_size
        passes = $archmeros_blur_passes
        ignore_opacity = true
        new_optimizations = true
        noise = 0.018
        contrast = 1.05
        brightness = 1.0
        vibrancy = $archmeros_blur_vibrancy
        popups = true
        popups_ignorealpha = 0.2
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = $archmeros_shadow
    }
}

animations {
    enabled = true
    bezier = curve, 0.16, 1, 0.3, 1
    animation = windows, 1, 5, curve, slide
    animation = windowsOut, 1, 5, curve, slide
    animation = border, 1, 8, curve
    animation = borderangle, 1, 8, curve
    animation = fade, 1, 5, curve
    animation = workspaces, 1, 6, curve, slidefade 18%
}

input {
    kb_layout = us,br
    kb_variant = ,abnt2
    kb_options = grp:alt_shift_toggle,lvl3:ralt_switch
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    sensitivity = 0
}

cursor {
    no_hardware_cursors = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}

bind = CTRL ALT, T, exec, $terminal
bind = $mod, SPACE, exec, $launcher
bind = $mod SHIFT, SPACE, exec, rofi -show drun -show-icons -theme ~/.config/rofi/launchers/drun.rasi
bind = $mod, E, exec, $paraHub
bind = CTRL ALT, SPACE, exec, hyprctl switchxkblayout current next
bind = $mod ALT, W, exec, ~/.config/archmeros/scripts/archmeros-wallpaper-pick.sh
bind = $mod ALT, A, exec, ~/.config/archmeros/scripts/archmeros-appearance.sh
bind = $mod ALT, S, exec, ~/.config/archmeros/scripts/archmeros-audio.sh
bind = $mod ALT, T, exec, ~/.config/archmeros/scripts/archmeros-theme-select.sh
binds = Alt_L, W, exec, ~/.config/archmeros/scripts/archmeros-close.sh
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = $mod, bracketright, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = $mod, bracketleft, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mod, backslash, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4

bind = CTRL ALT, LEFT, workspace, m-1
bind = CTRL ALT, RIGHT, workspace, m+1

bind = $mod SHIFT, F1, movetoworkspace, 1
bind = $mod SHIFT, F2, movetoworkspace, 2
bind = $mod SHIFT, F3, movetoworkspace, 3
bind = $mod SHIFT, F4, movetoworkspace, 4

bind = $mod, RETURN, exec, $terminal
bind = $mod, T, exec, $terminal
bind = $mod, Q, killactive
bind = $mod, V, togglefloating
bind = $mod, P, pseudo
bind = $mod, F, exec, ~/.config/archmeros/scripts/archmeros-fullscreen.sh
bind = $mod, C, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh
bind = $mod, O, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh full
bind = $mod SHIFT, O, exec, ~/.config/archmeros/scripts/archmeros-window-pop.sh medium
bind = $mod SHIFT, P, exec, wdisplays
bind = $mod SHIFT, B, exec, ~/.config/archmeros/scripts/archmeros-refresh-shell.sh
bind = $mod SHIFT, C, exec, ~/.config/archmeros/scripts/archmeros-webapp.sh chatgpt
bind = $mod, M, exec, ~/.config/archmeros/scripts/archmeros-webapp.sh youtube-music
bind = $mod, N, exec, ~/.config/archmeros/scripts/archmeros-productivity.sh
bind = $mod, G, exec, /usr/bin/telegram-desktop
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, LEFT, movefocus, l
bind = $mod, RIGHT, movefocus, r
bind = $mod, UP, movefocus, u
bind = $mod, DOWN, movefocus, d
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, LEFT, swapwindow, l
bind = $mod SHIFT, RIGHT, swapwindow, r
bind = $mod SHIFT, UP, swapwindow, u
bind = $mod SHIFT, DOWN, swapwindow, d
bind = ALT, TAB, exec, ~/.config/archmeros/scripts/archmeros-cycle-window.sh recent next
bind = ALT SHIFT, TAB, exec, ~/.config/archmeros/scripts/archmeros-cycle-window.sh recent prev
bind = $mod, TAB, exec, ~/.config/archmeros/scripts/archmeros-cycle-window.sh all next
bind = $mod SHIFT, TAB, exec, ~/.config/archmeros/scripts/archmeros-cycle-window.sh all prev
bindm = SHIFT, mouse:272, movewindow
bindm = SHIFT, mouse:273, resizewindow
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

windowrule = match:class (thunar|Thunar), opacity $archmeros_thunar_active_opacity $archmeros_thunar_inactive_opacity
windowrule = match:class (thunar|Thunar), float 1
windowrule = match:class (thunar|Thunar), size 72% 76%
windowrule = match:class (thunar|Thunar), center 1

windowrule = match:class ^(dev\\.benz\\.walker)$, float 1
windowrule = match:class ^(dev\\.benz\\.walker)$, center 1
windowrule = match:class ^(dev\\.benz\\.walker)$, size 34% 42%
windowrule = match:class ^(dev\\.benz\\.walker)$, opacity $archmeros_walker_active_opacity $archmeros_walker_inactive_opacity

windowrule = match:class (org\\.wezfurlong\\.wezterm), opacity $archmeros_terminal_active_opacity $archmeros_terminal_inactive_opacity
windowrule = match:class (code|codium|Code|Codium), opacity $archmeros_code_active_opacity $archmeros_code_inactive_opacity
windowrule = match:class ^(archmeros-chatgpt)$, float 1
windowrule = match:class ^(archmeros-chatgpt)$, size 72% 76%
windowrule = match:class ^(archmeros-chatgpt)$, center 1
windowrule = match:class ^(archmeros-chatgpt)$, opacity $archmeros_walker_active_opacity $archmeros_walker_inactive_opacity
windowrule = match:class ^(archmeros-youtube-music)$, workspace 9 silent
windowrule = match:class ^(archmeros-todoist)$, workspace 4 silent
windowrule = match:class ^(archmeros-evernote)$, workspace 4 silent

layerrule = blur on, ignore_alpha 0.15, match:namespace ^(waybar)$
layerrule = blur on, ignore_alpha 0.15, match:namespace ^(notifications)$
layerrule = blur on, ignore_alpha 0.15, match:namespace ^(walker)$
layerrule = blur on, ignore_alpha 0.15, match:namespace ^(rofi)$
