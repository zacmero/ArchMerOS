# Safer for mixed-kernel updates:
# include NVIDIA modules when they exist, but do not hard-require them for every image.
add_drivers+=" nvidia nvidia_modeset nvidia_uvm nvidia_drm "
# ArchMerOS boots through GRUB, not systemd-boot UKIs.
# Disable dracut UEFI image generation so updates don't fail on missing ESP token paths.
uefi="no"
omit_drivers+=" nouveau "
install_items+=" /etc/modprobe.d/archmeros-nvidia.conf "
